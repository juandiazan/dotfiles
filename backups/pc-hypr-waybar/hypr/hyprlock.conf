background {
    monitor =
    path = /home/juan/Pictures/walls/lockscreenbg.jpg   # Change this to your wallpaper!
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}
# red: rgb(201, 22, 41)
# cyan: rgb(36, 157, 157) 
# blue: rgb(41, 44, 73)
# teal: rgb(85, 212, 178)
# white: rgb(251, 240, 222)
# bordó: rgb(165, 41, 74)
input-field {
    monitor =
    size = 400, 60
    outline_thickness = 4
    dots_size = 0.33
    dots_spacing = 0.15

    # colors
    outer_color = rgb(36, 157, 157)
    inner_color = rgb(0, 0, 0)
    font_color = rgb(201, 22, 41)

    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgb(85, 212, 178)
  font_size = 40
  font_family = GoMono Nerd Font
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] date +"%-I:%M%p"
  color = rgb(85, 212, 178)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 180
  halign = center
  valign = center
}

# USER
label {
    monitor =
    text = cmd[update:1000] echo "Welcome, $(whoami)"
    color = $foreground
    font_size = 14
    font_family = JetBrains Mono
    position = 0, 50
    halign = center
    valign = center
}